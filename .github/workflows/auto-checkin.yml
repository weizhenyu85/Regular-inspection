name: Router 自动签到

on:
  # 定时执行 - 每6小时执行一次
  schedule:
    - cron: '0 */6 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      manual_run:
        description: '手动触发签到'
        required: false
        default: 'true'

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write  # 允许提交和推送更改

    # 将账号拆分到多个并行任务，每个任务运行在独立的 runner（不同出口 IP），
    # 规避目标平台按 IP 的签到数量限制（同一 IP 超过阈值后返回 403）。
    # 分组数需与下方 ACCOUNT_GROUP_COUNT 保持一致；14 个账号分 3 组 ≈ 每组 5 个。
    strategy:
      fail-fast: false
      matrix:
        group: [0, 1, 2]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 获取 Playwright 版本
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(python -c "from importlib.metadata import version; print(version('playwright'))")
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT
          echo "Playwright version: $PLAYWRIGHT_VERSION"

      - name: 缓存 Playwright 浏览器
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 安装 Playwright 浏览器
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 设置 Clash 代理（可选）
        env:
          SUBSCRIPTION_URL: ${{ secrets.PROXY_SUBSCRIPTION_URL }}
        run: |
          # 检查是否配置了代理订阅
          if [ -z "$SUBSCRIPTION_URL" ]; then
            echo "⚠️ 未配置代理订阅，跳过 Clash 代理设置"
            exit 0
          fi

          echo "=== 📡 开始配置 Clash 代理 ==="

          # 下载 Clash.Meta (mihomo)
          echo "📥 下载 Clash.Meta..."
          wget -q -O clash.gz "https://github.com/MetaCubeX/mihomo/releases/download/v1.18.10/mihomo-linux-amd64-v1.18.10.gz"
          gunzip clash.gz
          chmod +x clash

          # 生成 Clash 配置文件
          echo "📝 生成 Clash 配置..."
          cat > config.yaml << EOF
          mixed-port: 7890
          allow-lan: false
          mode: rule
          log-level: info
          external-controller: 127.0.0.1:9090

          proxy-providers:
            my-provider:
              type: http
              url: ${SUBSCRIPTION_URL}
              interval: 3600
              path: ./subscription.yaml
              health-check:
                enable: true
                interval: 300
                url: http://www.gstatic.com/generate_204

          proxies: []

          proxy-groups:
            - name: PROXY
              type: url-test
              use:
                - my-provider
              url: http://www.gstatic.com/generate_204
              interval: 300

          rules:
            - MATCH,PROXY
          EOF

          # 启动 Clash（后台运行）
          echo "🚀 启动 Clash..."
          ./clash -f config.yaml &
          CLASH_PID=$!
          echo "Clash PID: $CLASH_PID"

          # 等待 Clash 启动并下载订阅
          echo "⏳ 等待 Clash 启动和订阅下载（15秒）..."
          sleep 15

          # 测试代理是否可用
          echo "🔍 测试代理连接..."
          if curl -x http://127.0.0.1:7890 -s -m 10 -o /dev/null -w "%{http_code}" https://www.google.com | grep -q "200"; then
            echo "✅ Clash 代理启动成功"
          else
            echo "⚠️ 代理测试失败，但继续执行"
          fi

      - name: 执行签到
        env:
          # 账号配置
          ANYROUTER_ACCOUNTS: ${{ secrets.ANYROUTER_ACCOUNTS }}
          AGENTROUTER_ACCOUNTS: ${{ secrets.AGENTROUTER_ACCOUNTS }}
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          PROVIDERS: ${{ secrets.PROVIDERS }}

          # 通知配置
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          CUSTOM_SMTP_SERVER: ${{ secrets.CUSTOM_SMTP_SERVER }}
          DINGDING_WEBHOOK: ${{ secrets.DINGDING_WEBHOOK }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WEIXIN_WEBHOOK: ${{ secrets.WEIXIN_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERPUSHKEY: ${{ secrets.SERVERPUSHKEY }}

          # 代理配置（使用本地 Clash 提供的 HTTP 代理）
          # 仅当配置了代理订阅时才启用代理
          USE_PROXY: ${{ secrets.PROXY_SUBSCRIPTION_URL != '' }}
          PROXY_SERVER: ${{ secrets.PROXY_SUBSCRIPTION_URL != '' && 'http://127.0.0.1:7890' || '' }}

          # 代理细粒度控制（可选）
          PROXY_METHODS: ${{ secrets.PROXY_METHODS }}
          NO_PROXY_METHODS: ${{ secrets.NO_PROXY_METHODS }}

          # CI 环境优化
          CI_DISABLED_AUTH_METHODS: ${{ secrets.CI_DISABLED_AUTH_METHODS }}
          SESSION_CACHE_KEY: ${{ secrets.SESSION_CACHE_KEY }}

          # 账号分组（多 IP 分批签到，规避同 IP 风控）
          # ACCOUNT_GROUP_COUNT 必须与上方 matrix.group 的分组数一致
          ACCOUNT_GROUP: ${{ matrix.group }}
          ACCOUNT_GROUP_COUNT: '3'
        run: |
          python main.py

      - name: 提交余额数据
        if: always()
        env:
          GROUP: ${{ matrix.group }}
        run: |
          DATA_FILE="balance_data_g${GROUP}.json"
          HASH_FILE="balance_hash_g${GROUP}.txt"

          echo "=== 检查余额数据文件 ==="
          ls -lh "$DATA_FILE" "$HASH_FILE" || echo "文件不存在"

          echo "=== 配置 Git ==="
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          echo "=== 添加文件到暂存区 ==="
          git add "$DATA_FILE" "$HASH_FILE" 2>/dev/null || echo "添加文件失败（可能文件不存在）"

          if git diff --staged --quiet; then
            echo "⚠️ 没有需要提交的更改"
            exit 0
          fi

          git commit -m "自动更新余额数据 group ${GROUP} [skip ci]"

          # 多个并行分组任务会同时向 main 推送，直接 push 会因 non-fast-forward 失败。
          # 各分组写入独立文件（balance_*_gN），rebase 不会产生内容冲突，重试即可成功。
          echo "=== 推送到远程（rebase + 重试）==="
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "✅ 余额数据已提交并推送（group ${GROUP}）"
              exit 0
            fi
            echo "⚠️ 第 $i 次推送失败，随机等待后重试..."
            sleep $(( (RANDOM % 10) + 5 ))
          done
          echo "❌ 多次推送仍失败（不影响签到结果）"
          exit 0

      - name: 上传余额记录（备份）
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: balance-data-${{ github.run_number }}-g${{ matrix.group }}
          path: |
            balance_hash_g${{ matrix.group }}.txt
            balance_data_g${{ matrix.group }}.json
            checkin_result_g${{ matrix.group }}.json
          retention-days: 7

      # 上传本组签到结果，供汇总任务合并成单条通知
      - name: 上传分组结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkin-result-g${{ matrix.group }}
          path: checkin_result_g${{ matrix.group }}.json
          if-no-files-found: warn
          retention-days: 1

  # 汇总各分组结果，合并后发送单条通知
  notify:
    runs-on: ubuntu-latest
    needs: checkin
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install "httpx[http2]>=0.25.0" "python-dotenv>=1.0.0"

      - name: 下载所有分组结果
        uses: actions/download-artifact@v4
        with:
          pattern: checkin-result-g*
          path: group_results
          merge-multiple: true

      - name: 发送合并通知
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          CUSTOM_SMTP_SERVER: ${{ secrets.CUSTOM_SMTP_SERVER }}
          DINGDING_WEBHOOK: ${{ secrets.DINGDING_WEBHOOK }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WEIXIN_WEBHOOK: ${{ secrets.WEIXIN_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERPUSHKEY: ${{ secrets.SERVERPUSHKEY }}
        run: |
          python summary_notify.py group_results
